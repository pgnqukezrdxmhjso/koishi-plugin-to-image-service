_config:
  logInfo: Отладочная информация
  font:
    _prompt: Поддержка ttf, otf, woff, woff2. Рекомендуется ttf/otf (некоторые библиотеки не поддерживают woff или вариативные шрифты). Takumi поддерживает COLRv0. По умолчанию используются DingTalkJinBuTi-Regular и TwemojiCOLRv0.
    dir: Директория шрифтов
    defaultFamily: Семейство шрифтов по умолчанию
    defaultEmojiType: Тип Emoji по умолчанию
    takumiUseFontEmoji: takumi использует шрифтовые Emoji
    CDNNode: CDN-узел ресурсов (изображения Emoji)
  resource:
    _prompt: "Кэш в памяти для хранения изображений, загружаемых по ссылкам. Предотвращает повторную загрузку и ускоряет рендеринг. Малый пул: ресурсы ≤ smallPoolMaxEntrySize, ограничение по общему количеству для контроля памяти. Большой пул: ресурсы > smallPoolMaxEntrySize."
    smallPoolMaxItem: Малый пул - макс. количество ресурсов
    smallPoolMaxEntrySize: Малый пул - макс. размер одного ресурса (МБ)
    smallPoolTtl: Малый пул - время жизни (минут)
    largePoolMaxSize: Большой пул - макс. общий размер (МБ)
    largePoolMaxEntrySize: Большой пул - макс. размер одного ресурса (МБ)
    largePoolTtl: Большой пул - время жизни (минут)
