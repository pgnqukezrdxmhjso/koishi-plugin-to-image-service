_config:
  logInfo: 디버깅 정보
  font:
    _prompt: ttf, otf, woff, woff2 형식을 지원합니다. 일부 라이브러리에서 woff나 가변 글꼴을 지원하지 않으므로 가급적 ttf 또는 otf를 사용하세요. Takumi는 COLRv0 형식을 지원합니다. 폰트가 없을 경우 내장된 DingTalkJinBuTi-Regular와 TwemojiCOLRv0를 사용합니다.
    dir: 글꼴 디렉토리
    defaultFamily: 기본 글꼴 패밀리
    defaultEmojiType: 기본 이모지 유형
    takumiUseFontEmoji: takumi 글꼴 이모지 사용
    CDNNode: 리소스 CDN 노드 (이모지 이미지)
  resource:
    _prompt: "링크의 이미지 리소스를 저장하기 위한 메모리 캐시. 중복 다운로드를 방지하고 렌더링 속도를 향상시킵니다. 소형 풀: smallPoolMaxEntrySize 이하의 리소스, 총 개수로 메모리 사용량을 제한. 대형 풀: smallPoolMaxEntrySize 초과 리소스."
    smallPoolMaxItem: 소형 풀 - 최대 리소스 수
    smallPoolMaxEntrySize: 소형 풀 - 리소스당 최대 용량 (MB)
    smallPoolTtl: 소형 풀 - 만료 시간 (분)
    largePoolMaxSize: 대형 풀 - 최대 총 용량 (MB)
    largePoolMaxEntrySize: 대형 풀 - 리소스당 최대 용량 (MB)
    largePoolTtl: 대형 풀 - 만료 시간 (분)
